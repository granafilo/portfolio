<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Swiper demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <!-- Link Swiper's CSS -->

  <!-- Demo styles -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
    }

    .content {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border: 1px solid black;
    }

    #horizontal {
      display: flex;
      overflow-x: hidden;
    }
  </style>
</head>

<body>
  <!-- Swiper -->
  <div id="smooth-wrapper">
    <div id="smooth-content">
      <section id="horizontal">
        <div class="content">
          <p>1</p>
        </div>
        <div class="content">
          <p>2</p>
        </div>
        <div class="content">
          <p>3</p>
        </div>
        <div class="content">
          <p>4</p>
        </div>
      </section>
    </div>
  </div>


  <!-- Swiper JS -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
